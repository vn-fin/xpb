syntax = "proto3";

option go_package = "xpb/brokers";


service BrokerGatewayService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc SendEmailOTP(SendEmailOTPRequest) returns (SendEmailOTPResponse);
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc CreateFutureOrder(CreateFutureOrderRequest) returns (CreateFutureOrderResponse);
  rpc GetOrderById(GetOrderRequest) returns (GetOrderResponse);
  rpc GetPendingOrders(GetPendingOrdersRequest) returns (GetPendingOrdersResponse);
  rpc GetListFutureOrders(GetListOrdersRequest) returns (GetListOrdersResponse);
  rpc GetOrdersBySession(GetOrdersBySessionRequest) returns (GetOrdersBySessionResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
  rpc CancelFutureOrder(CancelFutureOrderRequest) returns (CancelOrderResponse);
  rpc UpdateOrder(UpdateOrderRequest) returns (UpdateOrderResponse);
  rpc GetPortfolio(GetPortfolioRequest) returns (GetPortfolioResponse);
  rpc GetAccountBalance(GetAccountBalanceRequest) returns (GetAccountBalanceResponse);
  rpc GetFuturePortfolio(GetPortfolioRequest) returns (GetFuturePortfolioResponse);
  rpc GetPortfolioByGroupId(GetPortfolioRequest) returns (GetPortfolioResponse);
  rpc GetTradingSummary(GetTradingSummaryRequest) returns (GetTradingSummaryResponse);
  rpc GetPnLSeries(GetPnLSeriesRequests)  returns (GetPnLSeriesResponse);
  rpc GetCredentialBalance(GetCredentialBalanceRequest) returns (GetCredentialBalanceResponse);
  rpc CheckCredentialLogin(CheckCredentialLoginRequest) returns (CheckCredentialLoginResponse);
  // Execution methods (by cred_id)
  rpc ExecutionGetPositions(ExecutionGetPositionsRequest) returns (ExecutionGetPositionsResponse);
  rpc ExecutionGetPositionBySymbol(ExecutionGetPositionBySymbolRequest) returns (ExecutionGetPositionBySymbolResponse);
  rpc ExecutionCreateOrder(ExecutionCreateOrderRequest) returns (ExecutionCreateOrderResponse);
  rpc ExecutionCancelOrder(ExecutionCancelOrderRequest) returns (ExecutionCancelOrderResponse);
  rpc ExecutionGetPendingOrders(ExecutionGetPendingOrdersRequest) returns (ExecutionGetPendingOrdersResponse);
  rpc ExecutionGetPendingOrdersBySymbol(ExecutionGetPendingOrdersBySymbolRequest) returns (ExecutionGetPendingOrdersBySymbolResponse);
  rpc ExecutionGetMaxSellQtyBySymbol(ExecutionGetMaxSellQtyBySymbolRequest) returns (ExecutionGetMaxSellQtyBySymbolResponse);
  rpc ExecutionGetMaxSellQtys(ExecutionGetMaxSellQtysRequest) returns (ExecutionGetMaxSellQtysResponse);
  // Execution methods (by account_id)
  rpc ExecutionGetPositionsByAccount(ExecutionGetPositionsByAccountRequest) returns (ExecutionGetPositionsByAccountResponse);
  rpc ExecutionGetPositionByAccountSymbol(ExecutionGetPositionByAccountSymbolRequest) returns (ExecutionGetPositionByAccountSymbolResponse);
  rpc ExecutionCreateOrderByAccount(ExecutionCreateOrderByAccountRequest) returns (ExecutionCreateOrderByAccountResponse);
  rpc ExecutionCancelOrderByAccount(ExecutionCancelOrderByAccountRequest) returns (ExecutionCancelOrderByAccountResponse);
  rpc ExecutionGetPendingOrdersByAccount(ExecutionGetPendingOrdersByAccountRequest) returns (ExecutionGetPendingOrdersByAccountResponse);
  rpc ExecutionGetPendingOrdersByAccountSymbol(ExecutionGetPendingOrdersByAccountSymbolRequest) returns (ExecutionGetPendingOrdersByAccountSymbolResponse);
  rpc ExecutionGetMaxSellQtyByAccountSymbol(ExecutionGetMaxSellQtyByAccountSymbolRequest) returns (ExecutionGetMaxSellQtyByAccountSymbolResponse);
  rpc ExecutionGetMaxSellQtysByAccount(ExecutionGetMaxSellQtysByAccountRequest) returns (ExecutionGetMaxSellQtysByAccountResponse);
}
message PnlSeriesItems{
  string date = 1;
  optional double daily_pnl = 2;
  optional double total_profit_amount = 3;
  optional double total_interes_amount = 4;
  optional double total_loss_amount = 5;
}

message GetPnLSeriesRequests{
  string group_id = 1;
  optional string account_type = 2;
  string range_time = 3;
}

message GetPnLSeriesResponse{
  bool success = 1;
  string message = 2;
  repeated PnlSeriesItems PnlSeriesItem = 3;
}


message GatewayOrderAgg {
  string order_session_id = 1;
  string symbol = 2;
  double price = 3;
  string order_side =4;
  string order_type = 5;
  double quantity = 6;
  double filled_qty = 7;
  double remaining_qty = 8;
  double matched_price = 9;
  optional double avg_price = 10;
  double cash = 11;
  string status = 12; // "pending" | "p_filled" | "filled" | "rejected"
  int64 created_at = 13;
  int64 updated_at = 14;
  string remark = 15;
}
/* OrderInfo - matches xno_execution.gateway.credential_orders table */
message OrderInfo {
  string order_id = 1;
  string user_id = 2;
  string credential_id = 3;
  string symbol = 4;
  string symbol_type = 5;
  string side = 6;
  string order_type = 7;
  double order_price = 8;
  double quantity = 9;
  double filled_qty = 10;
  double remaining_qty = 11;
  string status = 12;
  int64 created_at = 13;
  int64 updated_at = 14;
}

message GetPendingOrderInfo{
  string order_session_id = 1;
  string original_id = 2;
  string symbol = 3;
  string side =4;
  double quantity = 5;
  optional double filled = 6;
  optional double remaining = 7;
  int64 created_at =8;
}

message GetPendingOrderPaperTradeInfo{
  string order_id = 1;
  string symbol = 2;
  string side =3;
  double quantity = 4;
  optional double filled = 5;
  optional double remaining = 6;
  int64 created_at =7;
}



message OrderCreatedInfo{
  string symbol = 1;
  string order_session_id = 2;
}

/* Login */
message LoginRequest {
  string credential_id = 1;
  string otp = 2;
}

message LoginResponse {
  bool success = 1;
  string message = 2;
  string access_token =3;
}

/* Create Order - matches models.CreateOrderRequest */
message OrderInputInfo {
  string symbol = 1;
  string symbol_type = 2;
  double price = 3;
  int64 quantity = 4;
  string order_type = 5;
  string order_side = 6;
  string remark = 7;
}

message CreateOrderRequest {
  string access_token = 1;
  string group_id = 2;
  string basket_session_id = 3;
  repeated OrderInputInfo order_info = 4;
}

message CreateOrderResponse {
  bool success = 1;
  string message = 2;
  repeated OrderCreatedInfo orders = 3;
}


/* Get Order - matches models.GetOrderRequest */
message GetOrderRequest {
  string access_token = 1;
  string group_id = 2;
  string order_session_id = 3;
}

message GetOrderResponse {
  bool success = 1;
  string message = 2;
  GatewayOrderAgg order = 3;
}

/* Cancel Order - matches models.CancelOrderRequest */
message CancelOrderRequest {
  string access_token = 1;
  string order_session_id = 3;
}
message CancelFutureOrderRequest{
  string access_token = 1;
  string credential_id = 2;
  string order_session_id = 3;
}

message CancelOrderResponse {
  bool success = 1;
  string message = 2;
}

/* Portfolio */
message PortfolioItem {
  string symbol = 1;
  optional int64 quantity = 2;
  optional int64 t_0_buy = 3;
  optional int64 t_1_buy = 4;
  optional int64 t_2_buy = 5;
  optional double t_0_sell = 6;
  optional double t_1_sell = 7;
  optional double t_2_sell = 8;
  optional int64 pending_buy = 9;
  optional int64 pending_sell = 10;
  optional int64 bonus = 11;
  optional int64 available_trading = 12;
  double avg_price = 13;
  double market_price = 14;
  optional double fee = 15;
  optional double today_fee = 16;
  optional DealStockDetailInfo deal_stock_detail = 17;
}

message GetPortfolioRequest {
  string group_id = 1;
}

message GetPortfolioResponse {
  bool success = 1;
  string message = 2;
  repeated PortfolioItem items = 3;
}

/* Future Portfolio */
message FuturePortfolioItem {
  string symbol = 1;
  optional double long = 3;
  optional double short = 4;
  optional double net = 5;
  string account_id = 6;
  optional double wasp = 7;
  optional double wapb = 8;
  optional int64 net_off_vol = 9;
  optional double pending_buy = 10;
  optional double pending_sell = 11;
  optional double filled_buy = 12;
  optional double filled_sell = 13;
  optional double t0_buy = 14;
  optional double t0_sell = 15;
  string due_date = 16;
  double fee = 17;
  double today_fee = 18;
  optional DealFutureDetailInfo deal_future_detail = 19;
}

message GetFuturePortfolioResponse {
  bool success = 1;
  string message = 2;
  repeated FuturePortfolioItem items = 3;
}

/* Account Balance - matches models.GetAccountBalanceRequest */
message GetAccountBalanceRequest {
  string access_token = 1;
  string group_id = 2;
  string account_type = 3;
}

message GetCredentialBalanceRequest{
  string access_token = 1;
  string credential_id = 2;
}

message GetAccountBalanceResponse {
  bool success = 1;
  string message = 2;
  // Stock fields (3-9)
  optional double total_cash = 3;
  optional double available_cash = 4;
  optional double deposit_interest = 5;
  optional double total_debt = 6;
  optional double deposit_fee_amount = 7;
  optional double withdrawable_cash = 8;
  optional double cash_dividend_receiving = 9;
  // Future fields (10-15)
  optional double pending_deposit_withdraw = 10;
  optional double remain_secure = 11;
  optional double used_secure = 12;
  optional double pending_secure = 13;
  optional double hold_tax_and_fee = 14;
  optional double total_loan_debt = 15;
}

message GetCredentialBalanceResponse{
  bool success = 1;
  string message = 2;
  optional double total_cash = 3;
  optional double available_cash = 4;
  optional double deposit_interest = 5;
  optional double total_debt = 6;
  optional double deposit_fee_amount = 7;
  optional double withdrawable_cash = 8;
  optional double cash_dividend_receiving = 9;
  optional double pending_deposit_withdraw = 10;
  optional double remain_secure = 11;
  optional double used_secure = 12;
  optional double pending_secure = 13;
  optional double hold_tax_and_fee = 14;
  optional double total_loan_debt = 15;
}
/* Pending Orders - matches models.GetPendingOrdersRequest */
message GetPendingOrdersRequest {
  string access_token = 1;
  string group_id = 2;
}

message GetPendingOrdersResponse {
  repeated GetPendingOrderInfo pending_orders = 1;
}

message GetOrdersBySessionRequest{
  string group_id = 1;
  string basket_session_id = 2;
}

message GetOrdersBySessionResponse{
  bool success = 1;
  string message = 2;
  repeated GatewayOrderAgg orders = 3;
}

message GetListOrdersRequest {
  string user_id = 1;
}

message GetListOrdersResponse {
  repeated GatewayOrderAgg orders = 1;
}

/* Update Order - cancel old order, create new order with updated price */
message UpdateOrderRequest {
  string access_token = 1;
  string group_id = 2;
  string order_session_id = 3;
  double price = 4;
}

message UpdateOrderResponse {
  bool success = 1;
  string message = 2;
  string order_session_id = 3;
  OrderInfo order = 4;
}

message CreateFutureOrderRequest {
  string access_token = 1;
  string user_id = 2;
  string symbol = 3;
  string order_side = 4;
  string order_type = 5;
  double price = 6;
  int64 quantity = 7;
  string remark = 8;
}

message CreateFutureOrderResponse {
  bool success = 1;
  string message = 2;
  OrderCreatedInfo order = 4;
}

message ExecutionGetPendingOrdersRequest {
  string access_token = 1;
  string cred_id = 2;
}

message ExecutionGetPendingOrdersResponse {
  bool success = 1;
  string message = 2;
  repeated GetPendingOrderInfo pending_orders = 3;
}

message ExecutionGetPendingOrdersBySymbolRequest {
  string access_token = 1;
  string cred_id = 2;
  string symbol = 3;
}

message ExecutionGetPendingOrdersBySymbolResponse {
  bool success = 1;
  string message = 2;
  repeated GetPendingOrderInfo pending_orders = 3;
}

message ExecutionGetPositionsRequest {
  string access_token = 1;
  string cred_id = 2;
}

message PositionInfo {
  string symbol = 1;
  double position = 2;
  optional double sellable = 3;
}

message ExecutionGetPositionsResponse {
  bool success = 1;
  string message = 2;
  map<string, PositionInfo> positions = 3; // symbol -> PositionInfo
}

message ExecutionGetPositionBySymbolRequest {
  string access_token = 1;
  string cred_id = 2;
  string symbol = 3;
}

message ExecutionGetPositionBySymbolResponse {
  bool success = 1;
  string message = 2;
  double position = 3;
  optional double sellable = 4;
}

message ExecutionCreateOrderRequest {
  string access_token = 1;
  string cred_id = 2;
  string symbol = 3;
  string order_side = 4;
  string order_type = 5;
  double price = 6;
  double quantity = 7;
  string remark = 8;
}

message ExecutionCreateOrderResponse {
  bool success = 1;
  string message = 2;
  string original_order_id = 3;
  string order_session_id = 4;
  repeated OrderCreatedInfo orders = 5;
}

message ExecutionCancelOrderRequest {
  string access_token = 1;
  string cred_id = 2;
  string order_session_id = 3;
}

message ExecutionCancelOrderResponse {
  bool success = 1;
  string message = 2;
}

message ExecutionGetMaxSellQtyBySymbolRequest {
  string access_token = 1;
  string cred_id = 2;
  string symbol = 3;
}

message ExecutionGetMaxSellQtyBySymbolResponse {
  bool success = 1;
  string message = 2;
  double max_sell_qty = 3;
}

message ExecutionGetMaxSellQtysRequest {
  string access_token = 1;
  string cred_id = 2;
}
message MaxSellInfo {
  string symbol = 1;
  optional double max_sell_qtys = 2;
}
message ExecutionGetMaxSellQtysResponse {
  bool success = 1;
  string message = 2;
  map<string, MaxSellInfo> MaxSellInfos = 3; // symbol -> max_sell_qty
}

// Send email OTP DNSE
message SendEmailOTPRequest{
  string access_token = 1;
  string credential_id = 2;
}

message SendEmailOTPResponse{
  bool success = 1;
  string message = 2;
  string otp = 3;
}


message GetTradingSummaryRequest {
  string UserId = 1;
}
message TradingSummaryInfo {
  double total_buy = 1;
  double total_sell = 2;
  double pending_buy = 3;
  double pending_sell = 4;
  double net_filled =5;
  double net_pending =6;
}
message GetTradingSummaryResponse {
  bool success = 1;
  string message = 2;
  TradingSummaryInfo TradingSummaryInfo = 3;
}

// Execution by account_id
message ExecutionGetPositionsByAccountRequest {
  string access_token = 1;
  string account_id = 2;
}

message ExecutionGetPositionByAccountSymbolRequest {
  string access_token = 1;
  string account_id = 2;
  string symbol = 3;
}

message ExecutionCreateOrderByAccountRequest {
  string access_token = 1;
  string account_id = 2;
  string symbol = 3;
  string order_side = 4;
  string order_type = 5;
  double price = 6;
  double quantity = 7;
}

message ExecutionCancelOrderByAccountRequest {
  string access_token = 1;
  string account_id = 2;
  string order_id = 3;
}

message ExecutionGetPendingOrdersByAccountRequest {
  string access_token = 1;
  string account_id = 2;
}

message ExecutionGetPendingOrdersByAccountSymbolRequest {
  string access_token = 1;
  string account_id = 2;
  string symbol = 3;
}

message ExecutionGetMaxSellQtyByAccountSymbolRequest {
  string access_token = 1;
  string account_id = 2;
  string symbol = 3;
}

message ExecutionGetMaxSellQtysByAccountRequest {
  string access_token = 1;
  string account_id = 2;
}

// Execution by account_id responses
message ExecutionGetPositionsByAccountResponse {
  bool success = 1;
  string message = 2;
  map<string, PositionInfo> positions = 3;
}

message ExecutionGetPositionByAccountSymbolResponse {
  bool success = 1;
  string message = 2;
  double position = 3;
  optional double sellable = 4;
}

message ExecutionCreateOrderByAccountResponse {
  bool success = 1;
  string message = 2;
  string order_id = 3;
}

message ExecutionCancelOrderByAccountResponse {
  bool success = 1;
  string message = 2;
}

message ExecutionGetPendingOrdersByAccountResponse {
  bool success = 1;
  string message = 2;
  repeated GetPendingOrderPaperTradeInfo pending_orders = 3;
}

message ExecutionGetPendingOrdersByAccountSymbolResponse {
  bool success = 1;
  string message = 2;
  repeated GetPendingOrderPaperTradeInfo pending_orders = 3;
}

message ExecutionGetMaxSellQtyByAccountSymbolResponse {
  bool success = 1;
  string message = 2;
  double max_sell_qty = 3;
}

message ExecutionGetMaxSellQtysByAccountResponse {
  bool success = 1;
  string message = 2;
  map<string, MaxSellInfo> max_sell_infos = 3;
}

message CheckCredentialLoginRequest{
  string credential_id = 1;
}

message CheckCredentialLoginResponse{
  bool success = 1;
  string message = 2;
  bool login = 3;
}



